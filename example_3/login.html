<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Company Name</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login-styles.css">
</head>
<body>

  <div class="login-wrapper">
    <!-- Left Panel: Form -->
    <div class="login-left">
      <div class="login-form-container">
        <h1 class="brand-name">Company Name</h1>
        <p class="welcome-text">Welcome back! Please login to your account.</p>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="login-input" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" class="login-input" placeholder="Enter your password" required>
          </div>

          <div class="form-options">
            <label class="remember-label">
              <input type="checkbox" id="rememberMe" class="remember-checkbox">
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <div class="button-group">
            <button type="submit" class="btn-login">Login</button>
            <button type="button" class="btn-signup">Sign Up</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Right Panel: Navigation + Illustration -->
    <div class="login-right">
      <nav class="top-nav">
        <a href="#" class="nav-link active">Home</a>
        <a href="#" class="nav-link">About us</a>
        <a href="#" class="nav-link">Blog</a>
        <a href="#" class="nav-link">Pricing</a>
      </nav>

      <div class="illustration-wrapper">
        <img
          src="https://www.figma.com/api/mcp/asset/a72a15c2-9fa8-492d-8c0f-833a9ce50655"
          alt="Login illustration"
          class="illustration-img"
        >
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

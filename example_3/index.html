<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accommodations | The Wellhall Resort</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Accommodations Section -->
  <section id="accommodations" class="accommodations-section">
    <div class="container">
      <h2 class="section-title text-center">Accommodations</h2>

      <div class="row g-4 justify-content-center">

        <!-- De Luxe Room -->
        <div class="col-lg-4 col-md-6">
          <div class="room-card" data-room="deluxe">
            <div class="room-image-wrapper">
              <img
                src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=600&q=80"
                alt="De Luxe Room"
                class="room-image"
              >
              <div class="room-overlay">
                <span class="view-details-btn">View Details</span>
              </div>
            </div>
            <div class="room-info">
              <p class="room-capacity">2 adults | 1 child below 7</p>
              <h3 class="room-name">De Luxe Room</h3>
              <p class="room-price">from <strong>$189</strong> a night</p>
            </div>
          </div>
        </div>

        <!-- De Luxe Sea View -->
        <div class="col-lg-4 col-md-6">
          <div class="room-card" data-room="seaview">
            <div class="room-image-wrapper">
              <img
                src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=600&q=80"
                alt="De Luxe Sea View"
                class="room-image"
              >
              <div class="room-overlay">
                <span class="view-details-btn">View Details</span>
              </div>
            </div>
            <div class="room-info">
              <p class="room-capacity">2 adults | 1 child below 7</p>
              <h3 class="room-name">De Luxe Sea View</h3>
              <p class="room-price">from <strong>$209</strong> a night</p>
            </div>
          </div>
        </div>

        <!-- The Wellhall Family Suite -->
        <div class="col-lg-4 col-md-6">
          <div class="room-card" data-room="family">
            <div class="room-image-wrapper">
              <img
                src="https://images.unsplash.com/photo-1590490360182-c33d57733427?w=600&q=80"
                alt="The Wellhall Family Suite"
                class="room-image"
              >
              <div class="room-overlay">
                <span class="view-details-btn">View Details</span>
              </div>
            </div>
            <div class="room-info">
              <p class="room-capacity">4 adults | 2 children below 7</p>
              <h3 class="room-name">The Wellhall Family Suite</h3>
              <p class="room-price">from <strong>$399</strong> a night</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- Room Detail Modal -->
  <div class="modal fade" id="roomModal" tabindex="-1" aria-labelledby="roomModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="roomModalLabel"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <img id="modalImage" src="" alt="" class="img-fluid rounded mb-3 w-100">
          <p id="modalCapacity" class="room-capacity mb-1"></p>
          <p id="modalPrice" class="room-price"></p>
          <hr>
          <p id="modalDescription" class="modal-description"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-book">Book Now</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
